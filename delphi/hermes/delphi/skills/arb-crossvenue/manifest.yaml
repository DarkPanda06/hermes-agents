name: arb-crossvenue
version: 0.1.0
description: Cross-venue spread detector with mandatory resolution-criteria diff.
entrypoint: delphi.arb_crossvenue:scan
cadence: "*/15 * * * *"
inputs:
  - name: size_usd
    type: float
    default: 5000
  - name: threshold_pct
    type: float
    default: 1.0
  - name: min_similarity
    type: float
    default: 0.5
outputs:
  - name: alerts
    type: sqlite_table
    filter: "kind = crossvenue"
memory:
  reads: [markets]
  writes: [alerts]
guardrails:
  - "never emit an alert without criteria_diff + warning"
